# YOLOv8 超参数配置文件
# 详细说明每个超参数的作用、推荐值和调优建议

# ==================== 模型参数 ====================
# 控制模型的架构复杂度和规模
model:
  # 类别数：数据集中的目标类别数量
  # 推荐：COCO数据集为80，自定义数据集根据实际情况设置
  # 调优：必须与数据集标注一致，否则会导致损失计算错误
  num_classes: 80
  
  # 骨干网络名称：选择不同的骨干网络
  # 可选值：
  #   - 'CSPDarknet' (默认，YOLO原生骨干网络，平衡性能和速度)
  #   - 'ResNet50' (经典残差网络，适合迁移学习)
  #   - 'ResNet101' (更深的ResNet，精度更高但速度更慢)
  #   - 'MobileNetV3' (轻量级，适合移动端部署)
  #   - 'VGG16' (经典VGG网络，结构简单)
  #   - 'VGG19' (更深的VGG网络)
  # 说明：不同骨干网络有不同的参数量和计算复杂度
  # 调优：根据任务需求和硬件条件选择合适的骨干网络
  backbone_name: 'CSPDarknet'
  
  # 是否使用预训练权重（仅对ResNet、MobileNetV3、VGG有效）
  # 推荐：true (利用ImageNet预训练加速收敛), false (从头训练)
  # 说明：预训练权重可以帮助模型更快收敛，通常获得更好的性能
  # 调优：数据量小时建议开启，数据量大时可以尝试从头训练
  backbone_pretrained: true
  
  # 宽度缩放因子：控制模型每一层的通道数
  # 推荐：0.25 (nano), 0.5 (small), 1.0 (medium), 1.5 (large), 2.0 (extra large)
  # 说明：值越大模型越宽，参数量越多，精度通常更高但速度更慢
  # 调优：根据计算资源和精度需求选择，1.0为标准YOLOv8m配置
  width_multiple: 1
  
  # 深度缩放因子：控制模型层数的深度
  # 推荐：0.33 (nano), 0.33 (small), 0.67 (medium), 1.0 (large), 1.33 (extra large)
  # 说明：值越大模型越深，参数量越多，表达能力更强但训练更慢
  # 调优：通常与width_multiple配合使用，保持模型比例协调
  depth_multiple: 0.67

# ==================== 训练参数 ====================
# 控制训练过程的基本设置
training:
  # 训练轮数：完整遍历训练集的次数
  # 推荐：300 (COCO标准), 100-150 (小数据集), 500+ (大数据集)
  # 说明：epoch数太少可能欠拟合，太多可能导致过拟合
  # 调优：观察验证集mAP曲线，当mAP不再提升时可以提前停止
  epochs: 300
  
  # 批次大小：每次迭代训练的样本数
  # 推荐：16 (8GB显存), 32 (16GB显存), 64 (32GB显存或以上)
  # 说明：大批次通常训练更稳定，但需要更多显存 
  # 调优：尽可能使用最大的批次大小，显存不足时减小image_size
  batch_size: 16
  
  # 输入图像尺寸：训练和推理时使用的图像大小（正方形）
  # 推荐：640 (标准), 320 (快速), 1280 (高精度)
  # 说明：图像越大通常精度越高，但计算量和显存消耗也越大
  # 调优：在精度和速度之间权衡，640是常用的平衡点
  image_size: 320
  
  # 数据加载工作进程数：并行加载数据的子进程数量
  # 推荐：4-8 (普通PC), 8-16 (工作站), 16+ (服务器)
  # 说明：更多工作进程可以加速数据加载，但会增加内存消耗
  # 调优：通常设置为CPU核心数的1/2到2/3，避免设置过大导致系统卡顿
  num_workers: 2
  
  # 固定内存：是否将数据固定在内存中，加速GPU传输
  # 推荐：true (训练时), false (调试时)
  # 说明：设置为true可以显著加速数据到GPU的传输
  # 调优：训练时始终建议开启，除非遇到内存不足问题
  pin_memory: true
  
  # 保存目录：模型检查点和日志的保存路径
  # 推荐：'runs/train' (默认), 或任何自定义路径
  # 说明：所有训练输出（模型、日志、可视化）都将保存在此目录
  # 调优：根据需要修改，确保有足够的磁盘空间
  save_dir: 'runs/train'
  
  # 保存周期：每隔多少个epoch保存一次检查点
  # 推荐：10 (标准), 5 (频繁保存), 20 (节省空间)
  # 说明：定期保存可以防止训练中断导致的工作丢失
  # 调优：根据训练时长和磁盘空间调整，训练时间越长可以设置越大
  save_period: 50
  
  # 评估周期：每隔多少个epoch在验证集上评估一次
  # 推荐：10 (标准), 5 (频繁评估), 20 (加速训练)
  # 说明：频繁评估可以更好地监控训练进度，但会增加总训练时间
  # 调优：训练初期可以设置小一些（如5），后期可以增大（如10-20）
  eval_period: 20
  
  # 恢复训练：从指定检查点继续训练的路径
  # 推荐：null (从头开始), 'runs/train/best_model.pt' (从最佳模型恢复)
  # 说明：设置为检查点文件路径可以中断后继续训练
  # 调优：训练中断时设置为检查点路径，否则保持为null
  resume: null
  
  # 强制使用CPU：是否禁用GPU，强制使用CPU训练
  # 推荐：false (有GPU时), true (无GPU或调试时)
  # 说明：CPU训练速度极慢，仅在没有GPU或调试代码时使用
  # 调优：通常保持为false，除非明确需要使用CPU
  use_cpu: false

# ==================== 优化器参数 ====================
# 控制梯度下降优化器的行为
optimizer:
  # 优化器名称：使用的优化算法类型
  # 推荐：'AdamW' (标准), 'SGD' (传统), 'Adam' (通用)
  # 说明：AdamW是Adam的改进版，增加了权重衰减的正则化
  # 调优：通常使用AdamW可以获得稳定的收敛
  name: 'AdamW'
  
  # 学习率：参数更新的步长大小
  # 推荐：0.001 (AdamW标准), 0.01 (SGD标准)
  # 说明：学习率太大可能导致发散，太小可能导致收敛缓慢
  # 调优：可以使用学习率寻找器确定最佳值，或从0.001开始微调
  lr: 0.00025
  
  # 权重衰减：L2正则化系数，防止过拟合
  # 推荐：0.0001 (轻度正则化), 0.001 (中度), 0.01 (重度)
  # 说明：值越大模型越不容易过拟合，但可能欠拟合
  # 调优：小数据集可以增大到0.01，大数据集可以减小到0.0001
  weight_decay: 0.0001
  
  # Adam动量参数：控制一阶和二阶矩估计的衰减率
  # 推荐：[0.9, 0.999] (标准), [0.937, 0.999] (YOLO推荐)
  # 说明：beta1控制动量衰减，beta2控制梯度平方衰减
  # 调优：通常使用默认值，不需要调整
  betas: [0.937, 0.999]
  
  # 数值稳定常数：防止除以零的小数值
  # 推荐：1.0e-8 (标准), 1.0e-6 (更稳定)
  # 说明：保持数值计算的稳定性
  # 调优：通常使用默认值，不需要调整
  eps: 1.0e-8

# ==================== 学习率调度器参数 ====================
# 控制学习率随训练的变化策略
scheduler:
  # 调度器名称：学习率调整策略
  # 推荐：'CosineAnnealingLR' (平滑衰减), 'StepLR' (阶梯衰减)
  # 说明：余弦退火可以更平滑地降低学习率
  # 调优：CosineAnnealingLR通常效果更好
  name: 'CosineAnnealingLR'
  
  # 最大迭代次数：余弦退火的周期长度
  # 推荐：与epochs保持一致（如300）
  # 说明：控制学习率从初始值衰减到最小值的周期
  # 调优：通常设置为等于训练的epoch数
  T_max: 300
  
  # 最小学习率：学习率衰减到的最小值
  # 推荐：0.00001 (1e-5, 标准设置), 0.000001 (1e-6, 精细调优)
  # 说明：学习率不会低于此值，确保模型仍能微调
  # 调优：通常设置为初始学习率的1/100到1/1000
  eta_min: 0.00001
  
  # 预热轮数：学习率线性增长的epoch数
  # 推荐：3 (标准), 5 (大批次), 1 (小数据集)
  # 说明：训练初期使用较小的学习率，帮助模型稳定初始化
  # 调优：大批次可以增加warmup_epochs，小批次可以减少
  warmup_epochs: 3
  
  # 预热起始学习率：warmup阶段开始时的学习率
  # 推荐：0.0001 (1e-4, 标准设置)
  # 说明：warmup阶段从该值线性增长到初始学习率
  # 调优：通常设置为初始学习率的1/10，也可以从更小的值如1e-6开始
  warmup_start_lr: 0.0001

# ==================== 损失函数权重 ====================
# 控制不同损失项的相对重要性
loss:
  # 边界框损失权重
  box_gain: 5.0
  
  # 分类损失权重
  cls_gain: 2.0
  
  # DFL 损失权重
  dfl_gain: 2.5

  # obj_loss 权重
  obj_gain: 2.0

  # DFL 的 reg_max（和 YOLOv8 一样默认 16）
  reg_max: 16

  # 每个 GT 允许的最大正样本数，用于分配匹配
  max_pos_per_gt: 20

  # 是否使用 Varifocal / Focal 类的分类损失
  use_focal_loss: false


# ==================== 数据增强参数 ====================
# 控制训练时的数据增强策略
augmentation:
  # Mosaic增强概率：使用4张图像拼接的概率
  # 推荐：1.0 (始终使用, COCO标准), 0.5 (部分使用), 0.0 (禁用)
  # 说明：Mosaic可以显著提高小目标检测能力，但对某些任务可能不适用
  # 调优：COCO等复杂数据集建议1.0，简单任务或特定场景可以降低
  mosaic: 1.0
  
  # Mixup增强概率：混合两张图像和标签的概率
  # 推荐：0.0 (不使用, 稳定训练), 0.1 (轻度), 0.15 (标准)
  # 说明：Mixup可以增强模型泛化能力，但可能导致训练不稳定
  # 调优：通常从0.0开始，训练稳定后可以尝试0.1-0.15
  mixup: 0.0
  
  # Copy-paste增强概率：复制目标到其他图像的概率
  # 推荐：0.0 (不使用), 0.3 (轻度), 0.5 (中度)
  # 说明：可以增加目标的多样性，特别适合目标数量较少的场景
  # 调优：小样本数据集可以尝试0.3-0.5
  copy_paste: 0.0
  
  # HSV色相增强：调整图像色相的幅度（0-1范围）
  # 推荐：0.015 (轻度), 0.1 (中度), 0.0 (禁用)
  # 说明：增强颜色多样性，提高对不同光照条件的鲁棒性
  # 调优：通常0.015足够，颜色敏感的任务（如医疗）建议禁用
  hsv_h: 0.015
  
  # HSV饱和度增强：调整图像饱和度的幅度（0-1范围）
  # 推荐：0.7 (标准), 0.5 (保守), 0.9 (激进)
  # 说明：增强颜色饱和度的多样性
  # 调优：0.7是常用值，根据数据特点调整
  hsv_s: 0.7
  
  # HSV明度增强：调整图像明度的幅度（0-1范围）
  # 推荐：0.4 (标准), 0.3 (保守), 0.6 (激进)
  # 说明：增强亮度的多样性，提高对不同光照的鲁棒性
  # 调优：0.4是常用值，根据光照变化范围调整
  hsv_v: 0.4
  
  # 旋转角度：图像随机旋转的角度范围（度）
  # 推荐：0.0 (不旋转, COCO标准), 10.0 (轻度), 45.0 (大幅)
  # 说明：旋转可以增强模型的方向不变性
  # 调优：COCO等自然图像通常不需要旋转，旋转任务可以增大
  degrees: 0.0
  
  # 平移幅度：图像随机平移的比例（0-1范围）
  # 推荐：0.1 (轻度), 0.2 (标准), 0.5 (大幅)
  # 说明：模拟目标在不同位置的分布
  # 调优：0.1-0.2是常用值，目标位置变化大的场景可以增大
  translate: 0.1
  
  # 缩放比例：图像随机缩放的范围
  # 推荐：0.5 (标准, 即0.5-1.5倍), 0.2 (保守), 0.7 (大幅)
  # 说明：模拟目标的不同大小，提高尺度不变性
  # 调优：0.5是常用值，尺度变化大的场景可以增大
  scale: 0.5
  
  # 剪切角度：图像随机剪切的角度（度）
  # 推荐：0.0 (不剪切, COCO标准), 2.0 (轻度), 5.0 (中度)
  # 说明：剪切可以模拟视角变化
  # 调优：COCO通常不需要，特定任务可以尝试2-5度
  shear: 0.0
  
  # 透视变换强度：图像透视变换的强度
  # 推荐：0.0 (不使用, COCO标准), 0.0001 (轻度), 0.001 (中度)
  # 说明：模拟不同的拍摄角度
  # 调优：COCO通常不需要，需要视角不变性的任务可以尝试
  perspective: 0.0
  
  # 上下翻转概率：垂直翻转图像的概率
  # 推荐：0.0 (不翻转, COCO标准), 0.5 (等概率), 1.0 (总是翻转)
  # 说明：上下翻转通常不适用于自然场景（重力方向）
  # 调优：COCO保持0.0，医学影像等可能适用
  flipud: 0.0
  
  # 左右翻转概率：水平翻转图像的概率
  # 推荐：0.5 (标准), 0.0 (禁用), 1.0 (总是翻转)
  # 说明：水平翻转是最常用的增强，提高左右不变性
  # 调优：大多数场景使用0.5，文字等有方向性的任务使用0.0
  fliplr: 0.5

# ==================== 推理参数 ====================
# 控制模型推理时的行为
inference:
  # 置信度阈值：保留预测的最低置信度
  # 推荐：0.25 (标准, 平衡召回率和精确率), 0.5 (高精确率), 0.1 (高召回率)
  # 说明：值越高精确率越高但召回率降低，值越低召回率越高但精确率降低
  # 调优：根据应用需求调整，精确率重要时用0.5，召回率重要时用0.1
  conf_threshold: 0.5
  
  # IoU阈值：非极大值抑制(NMS)的IoU阈值
  # 推荐：0.45 (标准, COCO), 0.5 (保守), 0.25 (激进)
  # 说明：值越大保留的重复框越多，值越小过滤越严格
  # 调优：密集目标场景可以减小到0.25-0.3，稀疏目标可以增大到0.5
  iou_threshold: 0.45
  
  # 最大检测数：每张图像最多保留的检测框数量
  # 推荐：300 (标准), 100 (小数据集), 500 (密集场景)
  # 说明：限制检测数量可以提高速度和过滤低质量预测
  # 调优：通常场景300足够，密集场景（如人群）可以增大到500-1000
  max_det: 400
  
  # 半精度推理：是否使用FP16（16位浮点）进行推理
  # 推荐：false (标准), true (加速推理)
  # 说明：FP16可以加速2倍以上并减少显存占用，但可能略微降低精度
  # 调优：部署时建议开启以提升速度，训练评估时保持false以确保精度
  half: true

# ==================== 评估参数 ====================
# 控制模型性能评估的设置
evaluation:
  # IoU阈值列表：计算mAP时使用的IoU阈值序列
  # 推荐：[0.5, 0.55, ..., 0.95] (COCO标准), [0.5] (简化)
  # 说明：mAP@0.5使用0.5计算，mAP@0.5:0.95使用所有阈值的平均值
  # 调优：COCO标准包含10个阈值，快速评估可以只用[0.5]
  iou_thresholds: [0.5, 0.55, 0.6, 0.65, 0.7, 0.75, 0.8, 0.85, 0.9, 0.95]
  
  # 评估置信度阈值：评估时使用的预测置信度阈值
  # 推荐：0.001 (COCO标准, 覆盖所有预测), 0.25 (与推理一致)
  # 说明：评估时使用极低阈值以计算完整的PR曲线
  # 调优：COCO评估使用0.001，实际应用评估可以使用0.25
  conf_threshold: 0.001
  
  # 绘制混淆矩阵：是否生成混淆矩阵可视化
  # 推荐：true (分析时), false (训练时)
  # 说明：混淆矩阵可以直观展示各类别的分类性能
  # 调优：训练时可以设为false以加速，分析模型性能时设为true
  plot_confusion_matrix: false
  
  # 绘制PR曲线：是否生成精确率-召回率曲线
  # 推荐：true (分析时), false (训练时)
  # 说明：PR曲线展示精确率和召回率的关系
  # 调优：训练时可以设为false以加速，分析模型性能时设为true
  plot_pr_curve: false

# ==================== 数据集路径 ====================
# 指定训练和验证数据的位置
dataset:
  # 训练图像目录：包含训练图像的文件夹路径
  # 推荐：相对于项目根目录的路径
  # 说明：所有训练图像应直接在此目录下
  # 调优：确保路径正确，图像格式支持jpg/png等
  train: 'dataset/coco/train2017/image'
  
  # 验证图像目录：包含验证图像的文件夹路径
  # 推荐：相对于项目根目录的路径
  # 说明：所有验证图像应直接在此目录下
  # 调优：确保路径正确，验证集应与训练集独立
  val: 'dataset/coco/val2017/image'
  
  # 训练标注文件：COCO格式的训练标注JSON文件路径
  # 推荐：相对于项目根目录的路径
  # 说明：必须是COCO格式的instances文件，包含所有训练图像的标注
  # 调优：确保文件路径正确，标注格式必须符合COCO规范
  annotations_train: 'dataset/coco/train2017/annotations/instances_train2017.json'
  
  # 验证标注文件：COCO格式的验证标注JSON文件路径
  # 推荐：相对于项目根目录的路径
